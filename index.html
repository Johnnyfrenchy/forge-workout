function estimateDuration(session) {
  // rough estimate: sets * (restSec + 30s work)
  let total = 0;
  for (const ex of session.exercises) {
    total += ex.sets * (ex.restSeconds + 30);
  }
  return Math.round(total / 60);
}

// ============ ACTIVE SESSION ==============================================
function ActiveSessionScreen() {
  const { currentSession, updateCurrentSession, finishSession, discardCurrentSession, sessions } = useApp();
  const [currentExIdx, setCurrentExIdx] = useState(0);
  const [restTimer, setRestTimer] = useState(null);
  const [restRemaining, setRestRemaining] = useState(0);
  const [sentiment, setSentiment] = useState(null);
  const [sessionNote, setSessionNote] = useState("");
  const [confirmFinish, setConfirmFinish] = useState(false);
  const [showAbandonModal, setShowAbandonModal] = useState(false);
  const [swapTargetIdx, setSwapTargetIdx] = useState(null); // idx of exo being swapped

  useEffect(() => {
    if (!restTimer) return;
    const i = setInterval(() => {
      const remain = Math.max(0, Math.round((restTimer - Date.now()) / 1000));
      setRestRemaining(remain);
      if (remain <= 0) {
        clearInterval(i);
        setRestTimer(null);
        try { navigator.vibrate && navigator.vibrate([100, 50, 100]); } catch {}
      }
    }, 200);
    return () => clearInterval(i);
  }, [restTimer]);

  if (!currentSession) {
    return (
      <div className="p-6 text-center">
        <div className="font-mono text-xs text-[var(--ink-dim)] tracking-widest">PAS DE SESSION ACTIVE</div>
      </div>
    );
  }

  const exercises = currentSession.exercises || [];
  const currentEx = exercises[currentExIdx];
  const allLogged = exercises.every(ex => ex.logged);

  const logSet = async (exIdx, setIdx, field, value) => {
    await updateCurrentSession(cs => {
      const next = { ...cs };
      next.exercises = [...next.exercises];
      const ex = { ...next.exercises[exIdx] };
      ex.actualSets = ex.actualSets || Array.from({length: ex.sets}, () => ({ weight: null, reps: null, rpe: null, done: false }));
      ex.actualSets = [...ex.actualSets];
      ex.actualSets[setIdx] = { ...ex.actualSets[setIdx], [field]: value };
      next.exercises[exIdx] = ex;
      return next;
    });
  };

  const toggleSetDone = async (exIdx, setIdx) => {
    await updateCurrentSession(cs => {
      const next = { ...cs };
      next.exercises = [...next.exercises];
      const ex = { ...next.exercises[exIdx] };
      ex.actualSets = ex.actualSets || Array.from({length: ex.sets}, () => ({ weight: null, reps: null, rpe: null, done: false }));
      ex.actualSets = [...ex.actualSets];
      const wasDone = ex.actualSets[setIdx].done;
      ex.actualSets[setIdx] = { ...ex.actualSets[setIdx], done: !wasDone };
      next.exercises[exIdx] = ex;
      return next;
    });
    // Start rest timer on marking done
    const ex = exercises[exIdx];
    if (!ex.actualSets?.[setIdx]?.done) {
      setRestTimer(Date.now() + ex.restSeconds * 1000);
      setRestRemaining(ex.restSeconds);
    }
  };

  const markExerciseLogged = async (exIdx) => {
    await updateCurrentSession(cs => {
      const next = { ...cs };
      next.exercises = [...next.exercises];
      next.exercises[exIdx] = { ...next.exercises[exIdx], logged: true };
      return next;
    });
    if (exIdx < exercises.length - 1) setCurrentExIdx(exIdx + 1);
  };

  const finishWholeSession = async () => {
    // Consolidate loggedExercises for history/progression lookup
    // Exclude skipped exercises
    const loggedExercises = exercises
      .filter(ex => !ex.skipped)
      .map(ex => {
        const sets = ex.actualSets || [];
        const weights = sets.map(s => s.weight).filter(v => v != null);
        const reps = sets.map(s => s.reps).filter(v => v != null);
        const rpes = sets.map(s => s.rpe).filter(v => v != null);
        const avgRpe = rpes.length ? rpes.reduce((a,b)=>a+b,0)/rpes.length : null;
        const maxWeight = weights.length ? Math.max(...weights) : null;
        return {
          id: ex.id,
          name: ex.name,
          group: ex.group,
          weight: maxWeight,
          reps: reps,
          rpe: avgRpe,
          notes: ex.notes || "",
        };
      });
    const final = {
      ...currentSession,
      loggedExercises,
      sentiment,
      sessionNote,
    };
    await finishSession(final);
  };

  /** Swap an exercise in the current session with a different one */
  const handleSwap = async (exIdx, replacementDef) => {
    const newEntry = buildExerciseEntry(replacementDef, currentSession.style, sessions, currentSession.focus);
    await updateCurrentSession(cs => {
      const next = { ...cs };
      next.exercises = [...next.exercises];
      // Preserve any sets already logged? We reset, since it's a different exercise.
      next.exercises[exIdx] = { ...newEntry, swapped: true };
      // Update muscle groups if needed
      next.muscleGroups = [...new Set(next.exercises.map(e => e.group))];
      return next;
    });
    setSwapTargetIdx(null);
  };

  /** Skip an exercise: mark as logged but flag as skipped (excluded from history) */
  const handleSkip = async (exIdx) => {
    await updateCurrentSession(cs => {
      const next = { ...cs };
      next.exercises = [...next.exercises];
      next.exercises[exIdx] = { ...next.exercises[exIdx], logged: true, skipped: true };
      return next;
    });
    if (exIdx < exercises.length - 1) setCurrentExIdx(exIdx + 1);
  };

  return (
    <div className="p-4 max-w-screen-md mx-auto pb-safe anim-fade-up">
      {/* Header */}
      <div className="flex items-center justify-between mb-4">
        <div>
          <div className="font-mono text-[10px] text-[var(--accent)] tracking-widest">LIVE</div>
          <div className="font-display text-xl">{currentSession.type}</div>
        </div>
        <button
          onClick={() => setShowAbandonModal(true)}
          className="btn btn-ghost text-[10px] px-2 py-1 btn-danger"
          title="Abandonner"
        >✕ ABANDON</button>
      </div>

      {/* Rest timer */}
      {restTimer && restRemaining > 0 && (
        <div className="card p-3 mb-3 border-[var(--accent)] bg-[var(--bg-3)]">
          <div className="flex items-center justify-between">
            <div>
              <div className="font-mono text-[10px] text-[var(--accent)] tracking-widest">REPOS</div>
              <div className="font-display text-3xl leading-none">{String(Math.floor(restRemaining/60)).padStart(2,'0')}:{String(restRemaining%60).padStart(2,'0')}</div>
            </div>
            <button onClick={() => { setRestTimer(null); setRestRemaining(0); }} className="btn btn-ghost text-[10px]">SKIP</button>
          </div>
          <div className="mt-2 h-1 bg-[var(--bg)] relative">
            <div
              className="absolute top-0 left-0 h-1 bg-[var(--accent)]"
              style={{
                width: `${100 - (restRemaining / (currentEx?.restSeconds || 60)) * 100}%`,
                transition: 'width 0.2s linear'
              }}
            ></div>
          </div>
        </div>
      )}

      {/* Progress strip */}
      <div className="flex gap-1 mb-4">
        {exercises.map((ex, i) => (
          <button
            key={i}
            onClick={() => setCurrentExIdx(i)}
            className={`flex-1 h-1.5 ${ex.logged ? 'bg-[var(--accent)]' : i === currentExIdx ? 'bg-[var(--ink)]' : 'bg-[var(--line)]'}`}
          />
        ))}
      </div>

      {/* Exercise list */}
      <div className="space-y-3">
        {exercises.map((ex, i) => (
          <ActiveExerciseCard
            key={ex.id + i}
            ex={ex}
            idx={i}
            expanded={i === currentExIdx}
            onExpand={() => setCurrentExIdx(i)}
            onToggleSetDone={toggleSetDone}
            onLogSet={logSet}
            onMarkLogged={markExerciseLogged}
            onRequestSwap={(idx) => setSwapTargetIdx(idx)}
            onSkip={handleSkip}
          />
        ))}
      </div>

      {/* Finish section */}
      {allLogged && !confirmFinish && (
        <button onClick={() => setConfirmFinish(true)} className="btn btn-primary w-full mt-6 py-4">
          → TERMINER LA SÉANCE
        </button>
      )}

      {confirmFinish && (
        <div className="card p-5 mt-6 anim-fade-up">
          <div className="font-mono text-[10px] text-[var(--accent)] tracking-widest">DEBRIEF</div>
          <div className="font-display text-2xl mt-1">Comment c'était ?</div>

          <div className="mt-4 flex gap-2 justify-between">
            {[
              { emoji: "😤", key: "angry", label: "ÉNERVÉ" },
              { emoji: "😌", key: "zen",   label: "ZEN" },
              { emoji: "💪", key: "strong",label: "FORT" },
              { emoji: "🥴", key: "flat",  label: "FLAT" },
            ].map(s => (
              <button
                key={s.key}
                onClick={() => setSentiment(s.key)}
                className={`flex-1 p-3 card text-center ${sentiment === s.key ? 'border-[var(--accent)]' : ''}`}
              >
                <div className="text-2xl">{s.emoji}</div>
                <div className="font-mono text-[9px] text-[var(--ink-dim)] tracking-widest mt-1">{s.label}</div>
              </button>
            ))}
          </div>

          <div className="mt-4">
            <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-2">NOTES</div>
            <textarea
              value={sessionNote}
              onChange={e => setSessionNote(e.target.value)}
              rows={3}
              placeholder="Sensations, blessures, contexte..."
              className="w-full p-3 text-sm"
            />
          </div>

          <button onClick={finishWholeSession} className="btn btn-primary w-full mt-4">
            → VALIDER & ENREGISTRER
          </button>
          <button onClick={() => setConfirmFinish(false)} className="btn btn-ghost w-full mt-2 text-[11px]">
            RETOUR
          </button>
        </div>
      )}

      {showAbandonModal && (
        <ConfirmModal
          title="Abandonner la séance ?"
          body="Aucune donnée ne sera enregistrée. Tu pourras générer une nouvelle séance ou en choisir une autre manuellement."
          confirmLabel="ABANDONNER"
          onConfirm={async () => {
            setShowAbandonModal(false);
            await discardCurrentSession();
          }}
          onCancel={() => setShowAbandonModal(false)}
        />
      )}

      {swapTargetIdx !== null && (
        <SwapExerciseModal
          currentExercise={exercises[swapTargetIdx]}
          onSelect={(replacement) => handleSwap(swapTargetIdx, replacement)}
          onCancel={() => setSwapTargetIdx(null)}
        />
      )}
    </div>
  );
}

function ActiveExerciseCard({ ex, idx, expanded, onExpand, onToggleSetDone, onLogSet, onMarkLogged, onRequestSwap, onSkip }) {
  const actualSets = ex.actualSets || Array.from({length: ex.sets}, () => ({ weight: null, reps: null, rpe: null, done: false }));
  const doneCount = actualSets.filter(s => s.done).length;
  const unit = ex.repUnit || "reps";
  const isBodyweight = ex.group === "Core" || ex.id === "plank" || ex.id === "side_plank" || ex.id === "dead_bug" || ex.id === "bird_dog" || ex.id === "pallof";

  return (
    <div className={`card ${expanded ? 'border-[var(--ink-dim)]' : ''} ${ex.swapped ? 'border-l-2 border-l-[var(--info)]' : ''}`}>
      <button onClick={onExpand} className="w-full p-3 flex items-center gap-3 text-left">
        <div className="font-display text-2xl text-[var(--ink-low)] w-8 flex-shrink-0">{String(idx + 1).padStart(2, '0')}</div>
        <div className="flex-1 min-w-0">
          <div className="font-display text-sm truncate">
            {ex.name}
            {ex.swapped && <span className="font-mono text-[9px] text-[var(--info)] ml-2">SWAP</span>}
          </div>
          <div className="font-mono text-[10px] text-[var(--ink-dim)] mt-0.5">
            {doneCount}/{ex.sets} sets · {ex.sets}×{ex.repsTarget}{unit === 'sec' ? 's' : ''} · RPE {ex.rpeTarget}
          </div>
        </div>
        <div className="font-mono text-[10px] text-[var(--ink-dim)]">{expanded ? '▲' : '▼'}</div>
      </button>

      {expanded && (
        <div className="border-t border-[var(--line)] p-3 anim-fade-up">
          {ex.lastSession && (
            <div className="font-mono text-[10px] text-[var(--ink-dim)] mb-3">
              → Dernière fois : {ex.lastSession.weight ? `${ex.lastSession.weight}kg × ` : ''}[{ex.lastSession.reps?.join(', ') || '?'}] · RPE {ex.lastSession.rpe?.toFixed(1) || '?'}
            </div>
          )}
          {ex.progressionNote && (
            <div className="font-mono text-[10px] text-[var(--accent)] mb-3">
              → {ex.progressionNote}
            </div>
          )}

          {/* Action bar: swap + skip */}
          <div className="flex gap-2 mb-3">
            <button
              onClick={() => onRequestSwap(idx)}
              className="btn btn-ghost flex-1 text-[10px] py-2"
              title="Remplacer par un autre exercice (même groupe ou autre)"
            >
              ⇄ REMPLACER
            </button>
            <button
              onClick={() => {
                if (confirm("Passer cet exercice ?\nIl sera marqué comme non fait et n'apparaîtra pas dans l'historique.")) {
                  onSkip(idx);
                }
              }}
              className="btn btn-ghost flex-1 text-[10px] py-2"
            >
              → SKIP
            </button>
          </div>

          {/* Sets table */}
          <div className="space-y-2">
            <div className="grid grid-cols-12 gap-2 font-mono text-[9px] text-[var(--ink-low)] tracking-widest px-1">
              <div className="col-span-1"></div>
              <div className="col-span-2">SET</div>
              <div className={isBodyweight ? "col-span-0 hidden" : "col-span-4"}>
                {isBodyweight ? '' : 'KG'}
              </div>
              <div className={isBodyweight ? "col-span-7" : "col-span-3"}>
                {unit === 'sec' ? 'SEC' : 'REPS'}
              </div>
              <div className="col-span-2">RPE</div>
            </div>
            {actualSets.map((s, i) => (
              <div key={i} className="grid grid-cols-12 gap-2 items-center">
                <div className="col-span-1">
                  <div
                    className={`set-check ${s.done ? 'done' : ''}`}
                    onClick={() => onToggleSetDone(idx, i)}
                  ></div>
                </div>
                <div className="col-span-2 font-mono text-sm">{i + 1}</div>
                {!isBodyweight && (
                  <div className="col-span-4">
                    <input
                      type="number"
                      step="0.5"
                      inputMode="decimal"
                      value={s.weight ?? ''}
                      onChange={e => onLogSet(idx, i, 'weight', e.target.value ? parseFloat(e.target.value) : null)}
                      placeholder={ex.suggestedWeight ? String(ex.suggestedWeight) : '-'}
                      className="w-full px-2 py-1.5 text-sm"
                    />
                  </div>
                )}
                <div className={isBodyweight ? "col-span-7" : "col-span-3"}>
                  <input
                    type="number"
                    step="1"
                    inputMode="numeric"
                    value={s.reps ?? ''}
                    onChange={e => onLogSet(idx, i, 'reps', e.target.value ? parseInt(e.target.value, 10) : null)}
                    placeholder={ex.repsTarget}
                    className="w-full px-2 py-1.5 text-sm"
                  />
                </div>
                <div className="col-span-2">
                  <input
                    type="number"
                    step="0.5"
                    min="1"
                    max="10"
                    inputMode="decimal"
                    value={s.rpe ?? ''}
                    onChange={e => onLogSet(idx, i, 'rpe', e.target.value ? parseFloat(e.target.value) : null)}
                    placeholder={String(ex.rpeTarget)}
                    className="w-full px-2 py-1.5 text-sm"
                  />
                </div>
              </div>
            ))}
          </div>

          {/* Notes */}
          <div className="mt-3">
            <input
              type="text"
              value={ex.notes || ''}
              onChange={e => {
                ex.notes = e.target.value;
              }}
              onBlur={(e) => {
                const event = new CustomEvent('ex-note', { detail: { idx, value: e.target.value }});
                window.dispatchEvent(event);
              }}
              placeholder="Note technique..."
              className="w-full px-2 py-1.5 text-xs"
            />
          </div>

          <button onClick={() => onMarkLogged(idx)} className="btn btn-primary w-full mt-3 text-xs">
            → EXO SUIVANT
          </button>
        </div>
      )}
    </div>
  );
}

function SwapExerciseModal({ currentExercise, onSelect, onCancel }) {
  const [filterGroup, setFilterGroup] = useState(currentExercise?.group || "all");
  const [search, setSearch] = useState("");

  useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, []);

  const allGroups = ["all", ...new Set(EXERCISES.map(e => e.group))];
  const filtered = EXERCISES.filter(e => {
    if (e.id === currentExercise?.id) return false;
    if (filterGroup !== "all" && e.group !== filterGroup) return false;
    if (search && !e.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div
      className="fixed inset-0 z-50 flex items-end sm:items-center justify-center"
      style={{ background: 'rgba(0,0,0,0.8)' }}
      onClick={onCancel}
    >
      <div
        className="w-full max-w-md card-accent anim-fade-up max-h-[85vh] flex flex-col"
        style={{ margin: '16px' }}
        onClick={e => e.stopPropagation()}
      >
        <div className="p-4 border-b border-[var(--line)]">
          <div className="flex items-center justify-between mb-2">
            <div className="font-mono text-[10px] text-[var(--info)] tracking-widest">REMPLACER</div>
            <button onClick={onCancel} className="font-mono text-xs text-[var(--ink-dim)]">✕</button>
          </div>
          <div className="font-display text-lg leading-tight">{currentExercise?.name}</div>
          <div className="font-mono text-[10px] text-[var(--ink-dim)] mt-1">→ par :</div>

          <input
            type="text"
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Chercher un exo..."
            className="w-full mt-3 px-3 py-2 text-sm"
          />

          <div className="flex gap-1 mt-2 overflow-x-auto pb-1" style={{WebkitOverflowScrolling: 'touch'}}>
            {allGroups.map(g => (
              <button
                key={g}
                onClick={() => setFilterGroup(g)}
                className={`font-mono text-[10px] px-2 py-1 whitespace-nowrap border ${filterGroup === g ? 'border-[var(--accent)] text-[var(--accent)]' : 'border-[var(--line)] text-[var(--ink-dim)]'}`}
              >
                {g === "all" ? "TOUS" : g.toUpperCase()}
              </button>
            ))}
          </div>
        </div>

        <div className="flex-1 overflow-y-auto p-3">
          {filtered.length === 0 && (
            <div className="text-center py-8 font-mono text-xs text-[var(--ink-dim)]">
              Aucun exo trouvé
            </div>
          )}
          <div className="space-y-1">
            {filtered.map(ex => (
              <button
                key={ex.id}
                onClick={() => onSelect(ex)}
                className="w-full p-3 card text-left hover:border-[var(--ink-dim)] transition-colors"
              >
                <div className="flex items-center justify-between gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="font-display text-sm truncate">{ex.name}</div>
                    <div className="font-mono text-[10px] text-[var(--ink-dim)] mt-0.5">
                      {ex.group.toUpperCase()} · {ex.tier.toUpperCase()} · {ex.role === 'compound' ? 'POLY' : 'ISO'}
                    </div>
                  </div>
                  <div className="font-mono text-[10px] text-[var(--accent)]">→</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ HISTORY =====================================================
function HistoryScreen() {
  const { sessions, deleteSession } = useApp();
  const completed = sessions.filter(s => s.completed).sort((a,b) => new Date(b.date) - new Date(a.date));

  if (completed.length === 0) {
    return (
      <div className="p-6 text-center">
        <div className="font-display text-xl">Aucune séance</div>
        <div className="font-mono text-xs text-[var(--ink-dim)] mt-2">Complète ta première séance pour voir ton historique.</div>
      </div>
    );
  }

  return (
    <div className="p-4 max-w-screen-md mx-auto pb-safe">
      <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-3">HISTORY / {completed.length} SESSIONS</div>
      <div className="space-y-2">
        {completed.map(s => <HistoryCard key={s.id} session={s} onDelete={deleteSession} />)}
      </div>
    </div>
  );
}

function HistoryCard({ session, onDelete }) {
  const [expanded, setExpanded] = useState(false);
  const totalVolume = (session.loggedExercises || []).reduce((sum, ex) => {
    return sum + (ex.reps || []).reduce((a,b) => a+b, 0) * (ex.weight || 0);
  }, 0);
  const date = new Date(session.date);

  return (
    <div className="card">
      <button onClick={() => setExpanded(!expanded)} className="w-full p-3 text-left">
        <div className="flex items-center justify-between">
          <div>
            <div className="font-display text-base">{session.type}</div>
            <div className="font-mono text-[10px] text-[var(--ink-dim)] mt-0.5">
              {date.toLocaleDateString('fr-FR', { weekday: 'short', day: '2-digit', month: 'short' })} · {session.muscleGroups?.join(' / ')}
            </div>
          </div>
          <div className="text-right">
            <div className="font-display text-sm">{Math.round(totalVolume)}<span className="font-mono text-[9px] text-[var(--ink-dim)]">KG·R</span></div>
            <div className="font-mono text-[9px] text-[var(--ink-dim)]">{expanded ? '▲' : '▼'}</div>
          </div>
        </div>
      </button>
      {expanded && (
        <div className="border-t border-[var(--line)] p-3 anim-fade-up">
          <div className="space-y-2">
            {(session.loggedExercises || []).map((ex, i) => (
              <div key={i} className="flex items-start justify-between text-xs gap-2">
                <div className="flex-1 min-w-0">
                  <div className="font-display truncate">{ex.name}</div>
                  <div className="font-mono text-[10px] text-[var(--ink-dim)]">
                    {ex.weight}kg × [{(ex.reps || []).join(', ')}]
                  </div>
                </div>
                <div className="font-mono text-[10px] text-[var(--ink-dim)]">
                  RPE {ex.rpe?.toFixed(1) || '-'}
                </div>
              </div>
            ))}
          </div>
          {session.sessionNote && (
            <div className="mt-3 p-2 bg-[var(--bg-3)] border-l-2 border-[var(--accent)]">
              <div className="font-mono text-[9px] text-[var(--ink-dim)] tracking-widest">NOTE</div>
              <div className="text-xs mt-1">{session.sessionNote}</div>
            </div>
          )}
          <button
            onClick={() => { if (confirm("Supprimer cette séance ?")) onDelete(session.id); }}
            className="btn btn-ghost btn-danger text-[10px] mt-3"
          >
            SUPPRIMER
          </button>
        </div>
      )}
    </div>
  );
}

// ============ STATS =======================================================
function StatsScreen() {
  const { sessions } = useApp();
  const completed = sessions.filter(s => s.completed);

  if (completed.length < 2) {
    return (
      <div className="p-6 text-center">
        <div className="font-display text-xl">Pas assez de données</div>
        <div className="font-mono text-xs text-[var(--ink-dim)] mt-2">Complète au moins 2 séances pour voir tes stats.</div>
      </div>
    );
  }

  // Weekly volume trend (last 12 weeks)
  const weekMap = {};
  for (const s of completed) {
    const d = new Date(s.date);
    const year = d.getFullYear();
    const week = getWeekNumber(d);
    const key = `${year}-W${String(week).padStart(2, '0')}`;
    const vol = (s.loggedExercises || []).reduce((sum, ex) =>
      sum + (ex.reps || []).reduce((a,b) => a+b, 0) * (ex.weight || 0), 0);
    if (!weekMap[key]) weekMap[key] = { key, volume: 0, sessions: 0 };
    weekMap[key].volume += vol;
    weekMap[key].sessions += 1;
  }
  const weekData = Object.values(weekMap).sort((a,b) => a.key.localeCompare(b.key)).slice(-12);

  // Frequency trend (rolling 14d, by week)
  const freqData = weekData.map((w, i) => {
    const idx = Object.values(weekMap).findIndex(x => x.key === w.key);
    const recentTwo = Object.values(weekMap).slice(Math.max(0, idx-1), idx+1);
    const totalSess = recentTwo.reduce((a, b) => a + b.sessions, 0);
    return { key: w.key, freq: totalSess / 2 };
  });

  // Group frequency (last 30d)
  const groupFreq = groupFrequencyMap(sessions, 30);
  const groupData = Object.entries(groupFreq)
    .filter(([_, v]) => v > 0)
    .map(([name, value]) => ({ name: name.slice(0,4), value }));

  const { BarChart, Bar, LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

  return (
    <div className="p-4 max-w-screen-md mx-auto pb-safe">
      <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-4">ANALYTICS</div>

      {/* KPI strip */}
      <div className="grid grid-cols-3 gap-2 mb-4">
        <KpiCard label="TOT SESS" value={completed.length} />
        <KpiCard label="VOL 7J" value={Math.round(weekData.slice(-1)[0]?.volume || 0)} unit="KG·R" />
        <KpiCard label="FREQ" value={computeFrequency(sessions, 14).toFixed(1)} unit="/WK" />
      </div>

      {/* Volume trend */}
      <div className="card p-4 mb-4">
        <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-3">VOLUME / 12 WEEKS</div>
        <div style={{ width: '100%', height: 180 }}>
          <ResponsiveContainer>
            <BarChart data={weekData} margin={{top: 5, right: 5, bottom: 5, left: 0}}>
              <CartesianGrid strokeDasharray="2 4" stroke="#2a2a2a" vertical={false} />
              <XAxis dataKey="key" tick={{ fontSize: 9, fill: '#8a8a8a' }} axisLine={{stroke:'#3a3a3a'}} tickLine={false} tickFormatter={(v) => v.split('-W')[1]} />
              <YAxis tick={{ fontSize: 9, fill: '#8a8a8a' }} axisLine={{stroke:'#3a3a3a'}} tickLine={false} width={40} />
              <Tooltip
                contentStyle={{background:'#141414', border:'1px solid #3a3a3a', fontFamily:'JetBrains Mono', fontSize:11}}
                labelStyle={{color:'#e8e8e8'}}
              />
              <Bar dataKey="volume" fill="#c6f042" />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Frequency trend */}
      <div className="card p-4 mb-4">
        <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-3">FREQUENCY TREND</div>
        <div style={{ width: '100%', height: 140 }}>
          <ResponsiveContainer>
            <LineChart data={freqData} margin={{top: 5, right: 5, bottom: 5, left: 0}}>
              <CartesianGrid strokeDasharray="2 4" stroke="#2a2a2a" vertical={false} />
              <XAxis dataKey="key" tick={{ fontSize: 9, fill: '#8a8a8a' }} axisLine={{stroke:'#3a3a3a'}} tickLine={false} tickFormatter={(v) => v.split('-W')[1]} />
              <YAxis tick={{ fontSize: 9, fill: '#8a8a8a' }} axisLine={{stroke:'#3a3a3a'}} tickLine={false} width={30} domain={[0, 'dataMax + 1']} />
              <Tooltip
                contentStyle={{background:'#141414', border:'1px solid #3a3a3a', fontFamily:'JetBrains Mono', fontSize:11}}
              />
              <Line type="stepAfter" dataKey="freq" stroke="#c6f042" strokeWidth={2} dot={{fill:'#c6f042', r: 3}} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Group frequency */}
      <div className="card p-4 mb-4">
        <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-3">GROUPS / LAST 30 DAYS</div>
        <div style={{ width: '100%', height: 180 }}>
          <ResponsiveContainer>
            <BarChart data={groupData} layout="vertical" margin={{top: 5, right: 20, bottom: 5, left: 0}}>
              <CartesianGrid strokeDasharray="2 4" stroke="#2a2a2a" horizontal={false} />
              <XAxis type="number" tick={{ fontSize: 9, fill: '#8a8a8a' }} axisLine={{stroke:'#3a3a3a'}} tickLine={false} />
              <YAxis type="category" dataKey="name" tick={{ fontSize: 10, fill: '#8a8a8a', fontFamily: 'JetBrains Mono' }} axisLine={{stroke:'#3a3a3a'}} tickLine={false} width={50} />
              <Tooltip
                contentStyle={{background:'#141414', border:'1px solid #3a3a3a', fontFamily:'JetBrains Mono', fontSize:11}}
              />
              <Bar dataKey="value" fill="#c6f042" />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Recent sessions list */}
      <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-2">RECENT DISTRIBUTION</div>
      <div className="flex gap-1 h-10 mb-8">
        {completed.slice(0, 30).reverse().map((s, i) => {
          const color = s.style === 'heavy' ? 'var(--accent)' : 'var(--info)';
          return (
            <div
              key={i}
              className="flex-1"
              style={{ background: color, opacity: 0.3 + Math.min(1, (s.plannedVolume || 10) / 30) * 0.7 }}
              title={s.type}
            />
          );
        })}
      </div>
    </div>
  );
}

function KpiCard({ label, value, unit }) {
  return (
    <div className="card p-3">
      <div className="font-mono text-[9px] text-[var(--ink-dim)] tracking-widest">{label}</div>
      <div className="font-display text-xl mt-1 leading-none">
        {value}
        {unit && <span className="font-mono text-[9px] text-[var(--ink-dim)] ml-1">{unit}</span>}
      </div>
    </div>
  );
}

// ============ SETTINGS ====================================================
function SettingsScreen() {
  const { settings, updateSettings, sessions, isFirebase } = useApp();
  const [showDebug, setShowDebug] = useState(false);

  if (!settings) return null;

  const exportData = () => {
    const data = { settings, sessions, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `forge_export_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="p-4 max-w-screen-md mx-auto pb-safe">
      <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-4">CONFIGURATION</div>

      <div className="card p-4 mb-4">
        <div className="font-display text-sm mb-3">Objectif hebdomadaire</div>
        <div className="grid grid-cols-4 gap-2">
          {[2, 3, 4, 5].map(n => (
            <button
              key={n}
              onClick={() => updateSettings({ weeklyTarget: n })}
              className={`p-3 border ${settings.weeklyTarget === n ? 'border-[var(--accent)] bg-[var(--bg-3)]' : 'border-[var(--line)]'}`}
            >
              <div className="font-display text-xl">{n}</div>
              <div className="font-mono text-[9px] text-[var(--ink-dim)] mt-1">/WK</div>
            </button>
          ))}
        </div>
      </div>

      <div className="card p-4 mb-4">
        <div className="font-display text-sm mb-3">Règles du protocole</div>

        <label className="flex items-center justify-between py-3 border-b border-[var(--line)]">
          <div className="flex-1 pr-4">
            <div className="text-sm">Deload adaptative</div>
            <div className="font-mono text-[10px] text-[var(--ink-dim)] mt-0.5">Propose deload si 3 sem. volume élevé</div>
          </div>
          <input
            type="checkbox"
            checked={settings.adaptiveDeload}
            onChange={e => updateSettings({ adaptiveDeload: e.target.checked })}
            className="accent-[var(--accent)] w-5 h-5"
          />
        </label>

        <label className="flex items-center justify-between py-3">
          <div className="flex-1 pr-4">
            <div className="text-sm">Repos 48h strict</div>
            <div className="font-mono text-[10px] text-[var(--ink-dim)] mt-0.5">Refuse groupes &lt;48h</div>
          </div>
          <input
            type="checkbox"
            checked={settings.strictRest}
            onChange={e => updateSettings({ strictRest: e.target.checked })}
            className="accent-[var(--accent)] w-5 h-5"
          />
        </label>
      </div>

      <div className="card p-4 mb-4">
        <div className="font-display text-sm mb-3">Données</div>

        <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-3">
          <div>STORAGE · {isFirebase ? "FIREBASE + LOCAL" : "LOCAL ONLY"}</div>
          <div className="mt-0.5">SESSIONS · {sessions.filter(s=>s.completed).length}</div>
        </div>

        <button onClick={exportData} className="btn btn-ghost w-full mb-2 text-xs">
          EXPORT JSON
        </button>
        <button
          onClick={() => setShowDebug(!showDebug)}
          className="btn btn-ghost w-full text-xs"
        >
          {showDebug ? "HIDE" : "SHOW"} DEBUG
        </button>
      </div>

      {showDebug && (
        <div className="card p-3 mb-4 font-mono text-[10px] overflow-auto">
          <pre className="whitespace-pre-wrap break-all">{JSON.stringify({ settings, sessions: sessions.slice(0, 3) }, null, 2)}</pre>
        </div>
      )}

      <div className="text-center font-mono text-[10px] text-[var(--ink-low)] tracking-widest mt-8">
        FORGE / WORKOUT PROTOCOL / v1.0
      </div>
    </div>
  );
}

// ============ APP ROOT ====================================================
function AppRoot() {
  const { bootState, tab } = useApp();

  if (bootState === "loading") return <LoadingScreen />;
  if (bootState === "needsOnboarding") return <Onboarding />;

  return (
    <div className="min-h-screen bg-grid">
      <Header />
      <main className="relative z-10">
        {tab === "today"    && <TodayScreen />}
        {tab === "active"   && <ActiveSessionScreen />}
        {tab === "history"  && <HistoryScreen />}
        {tab === "stats"    && <StatsScreen />}
        {tab === "settings" && <SettingsScreen />}
      </main>
      <BottomNav />
    </div>
  );
}

function App() {
  return (
    <AppProvider>
      <AppRoot />
    </AppProvider>
  );
}

// ============ MOUNT =======================================================
const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(<App />);

// Register Service Worker for PWA offline/caching (only on HTTPS or localhost)
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed:', err));
  });
}
</script>
