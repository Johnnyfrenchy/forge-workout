<style>
  /* Typography: JetBrains Mono for body (terminal feel), Space Grotesk banned, we use Archivo Black for display */
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Archivo+Black&family=Archivo:wght@400;500;600;700;900&display=swap');

  :root {
    --bg: #0a0a0a;
    --bg-2: #141414;

    --line-bright: #3a3a3a;
    --ink: #e8e8e8;
    --ink-dim: #8a8a8a;
    --ink-low: #5a5a5a;
    --accent: #c6f042;       /* acid lime */

    --danger: #ff5252;
    --warn: #ffaa33;
    --info: #6ec0ff;
  }

  html, body, #root { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Archivo', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  .font-display { font-family: 'Archivo Black', 'Archivo', sans-serif; letter-spacing: -0.02em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  /* Grid paper background */
  .bg-grid {
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 32px 32px;
    background-position: -1px -1px;
  }

  /* Noise overlay */
  .noise::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.035;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* Tick marks */
  .tick-border {
    background-image: linear-gradient(90deg, var(--line-bright) 1px, transparent 1px);
    background-size: 8px 100%;
    background-repeat: repeat-x;
  }

  /* Inputs */
  input[type=number], input[type=text], textarea, select {
    background: var(--bg-3);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    transition: border-color 120ms ease;
  }
  input[type=number]:focus, input[type=text]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* Range slider */
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    background: var(--bg-3);
    height: 4px; border-radius: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px; border-radius: 0;
    background: var(--accent); cursor: pointer;
    border: 2px solid var(--bg);
  }
  input[type=range]::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 0;
    background: var(--accent); cursor: pointer;
    border: 2px solid var(--bg);
  }

  /* Buttons base */
  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 12px 16px;
    border: 1px solid var(--line-bright);
    background: var(--bg-2);
    color: var(--ink);
    transition: all 120ms ease;
    cursor: pointer;

  .btn-primary {

<script>
  window._errors = [];
  window._bootError = (msg) => {
    const diag = [
      'React: '         + (typeof React !== 'undefined' ? 'OK v' + React.version : 'MISSING'),
      'ReactDOM: '      + (typeof ReactDOM !== 'undefined' ? 'OK' : 'MISSING'),
      'Babel: '         + (typeof Babel !== 'undefined' ? 'OK' : 'MISSING'),
      'Recharts: '      + (typeof Recharts !== 'undefined' ? 'OK' : 'MISSING'),
      'Tailwind: '      + (typeof tailwind !== 'undefined' ? 'OK' : 'MISSING'),
      'Firebase SDK: '  + (window.firebase ? 'OK' : 'not loaded (localStorage mode)'),
      '',
      'Errors caught:',
      ...(window._errors.length ? window._errors : ['(none)'])
    ].join('\n');
    document.getElementById('boot-error').style.display = 'block';
    document.getElementById('boot-error-msg').textContent = msg;
    document.getElementById('boot-diag').textContent = diag;
  };
  window.addEventListener('error', (e) => {
    const src = e.filename ? e.filename.split('/').pop() : 'inline';
    window._errors.push(src + ': ' + (e.message || String(e.error)));
  });
  setTimeout(() => {
    const root = document.getElementById('root');
    if (!root || root.children.length === 0) {
      window._bootError('App did not mount within 5 seconds.');
    }
  }, 5000);
</script>

// ============ ALGO: FREQUENCY DETECTION ===================================
/**
 * Compute rolling average sessions per week over the last N days (default 14).
 * Returns 0 if no data. Used to decide the split.
 */
function computeFrequency(sessions, days = 14) {
  if (!sessions || sessions.length === 0) return 0;
  const now = Date.now();
  const cutoff = now - days * 24 * 60 * 60 * 1000;
  const recent = sessions.filter(s => new Date(s.date).getTime() >= cutoff && s.completed);
  const weeks = days / 7;
  return recent.length / weeks;
}

/**
 * Pick the active split based on frequency.
 * Bootstrap: if history < 14 days, use user's seed target.
 */
function pickSplit(sessions, seedTarget, settings) {
  const oldestSession = sessions.reduce((acc, s) => {
    const t = new Date(s.date).getTime();
    return (!acc || t < acc) ? t : acc;
  }, null);
  const historyDays = oldestSession ? (Date.now() - oldestSession) / (24*60*60*1000) : 0;

  let effectiveFreq;
  if (historyDays < 14 && seedTarget) {
    effectiveFreq = seedTarget;
  } else {
    effectiveFreq = computeFrequency(sessions, 14);
  }

  if (effectiveFreq >= 3.5) return SPLITS.UPPER_LOWER;
  if (effectiveFreq >= 2.5) return SPLITS.PPL;
  if (effectiveFreq >= 1.5) return SPLITS.FULL_BODY;
  return SPLITS.MAINTENANCE;
}

// ============ ALGO: SESSION PICKER ========================================
/**
 * Find hours since a muscle group was last trained.
 * Returns Infinity if never trained.
 */
function hoursSinceGroupTrained(sessions, group) {
  const completed = sessions.filter(s => s.completed);
  let mostRecent = 0;
  for (const s of completed) {
    if ((s.muscleGroups || []).includes(group)) {
      const t = new Date(s.date).getTime();
      if (t > mostRecent) mostRecent = t;
    }
  }
  if (mostRecent === 0) return Infinity;
  return (Date.now() - mostRecent) / (60 * 60 * 1000);
}

/**
 * Count how many times each group was trained in the last 30 days.
 */
function groupFrequencyMap(sessions, days = 30) {
  const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
  const map = {};
  for (const g of Object.values(MUSCLE_GROUPS)) map[g] = 0;
  for (const s of sessions) {
    if (!s.completed) continue;
    if (new Date(s.date).getTime() < cutoff) continue;
    for (const g of (s.muscleGroups || [])) {
      map[g] = (map[g] || 0) + 1;
    }
  }
  return map;
}

/**
 * Pick the next session type given the current split and recent history.
 * Rules:
 * - Respect 48h rest per group
 * - Alternate Heavy / Hyper within the same focus
 * - Prefer focus areas that are under-trained this month
 */
function pickNextSessionType(sessions, split) {
  const completed = sessions.filter(s => s.completed).sort((a,b) => new Date(b.date) - new Date(a.date));
  const last = completed[0];
  const lastStyle = last?.type || null;
  const lastFocus = last ? deriveFocus(last) : null;

  // Candidate session types for this split
  const candidates = Object.entries(SESSION_TYPES)
    .filter(([_, v]) => v.split === split)
    .map(([k, v]) => ({ key: k, ...v }));

  // Score each candidate
  const freqMap = groupFrequencyMap(sessions, 30);
  const scored = candidates.map(c => {
    const groups = groupsForFocus(c.focus);
    // 48h rest constraint
    const minHours = Math.min(...groups.map(g => hoursSinceGroupTrained(sessions, g)));
    const restOK = minHours >= 48;

    // Avg monthly frequency of this focus's groups
    const avgFreq = groups.reduce((sum, g) => sum + (freqMap[g] || 0), 0) / groups.length;

    // Alternate heavy/hyper within same focus
    const alternationBonus = (lastFocus === c.focus && lastStyle === c.style) ? -10 : 5;

    // Prefer different focus than last
    const focusBonus = (lastFocus === c.focus) ? -5 : 10;

    let score = 0;
    if (!restOK) score -= 1000;
    score -= avgFreq * 2;  // lower freq => higher priority
    score += alternationBonus;
    score += focusBonus;

    return { ...c, score, restOK, avgFreq };
  });

  scored.sort((a, b) => b.score - a.score);

  // If best candidate is still rest-blocked, fall back to best even with partial rest
  return scored[0];
}

function deriveFocus(session) {
  const groups = session.muscleGroups || [];
  if (groups.some(g => SPLIT_GROUPS.LOWER.includes(g))) {
    if (groups.some(g => SPLIT_GROUPS.UPPER.includes(g))) return "full";
    return "lower";
  }
  if (groups.some(g => SPLIT_GROUPS.PUSH.includes(g)) && !groups.some(g => SPLIT_GROUPS.PULL.includes(g))) return "push";
  if (groups.some(g => SPLIT_GROUPS.PULL.includes(g)) && !groups.some(g => SPLIT_GROUPS.PUSH.includes(g))) return "pull";
  return "upper";
}

function groupsForFocus(focus) {
  switch (focus) {
    case "upper": return SPLIT_GROUPS.UPPER;
    case "lower": return SPLIT_GROUPS.LOWER;
    case "push":  return SPLIT_GROUPS.PUSH;
    case "pull":  return SPLIT_GROUPS.PULL;
    case "legs":  return SPLIT_GROUPS.LEGS;
    case "full":  return SPLIT_GROUPS.FULL;
    default: return [];
  }
}

// ============ ALGO: EXERCISE SELECTION + PROGRESSION ======================
/**
 * Build exercise list for a session given focus + style.
 * Heavy: 1 compound primary (or best available) per group + 1 secondary on main groups. 4x5-6.
 * Hyper: 1 secondary + 1 accessory per group. 3x8-12 or 3x10-15.
 * Guarantees at least 1 exercise per targeted group.
 */
function buildExercises(focus, style, sessions) {
  const groups = groupsForFocus(focus);
  const result = [];

  // Groups that get a bonus "second" exercise in heavy sessions
  const mainGroupsByFocus = {
    upper: ["Chest", "Back", "Shoulders"],
    lower: ["Quads", "Hamstrings", "Glutes"],
    push:  ["Chest", "Shoulders"],
    pull:  ["Back"],
    legs:  ["Quads", "Hamstrings", "Glutes"],
    full:  ["Chest", "Back", "Quads"],
  };
  const mainGroups = mainGroupsByFocus[focus] || [];

  for (const group of groups) {
    const pool = EXERCISES.filter(e => e.group === group);
    if (pool.length === 0) continue;

    if (style === "heavy") {
      // Pick best available: primary > secondary > accessory (fallback for small-muscle groups)
      const byTier = (t) => pool.filter(e => e.tier === t);
      let first = pickRotating(byTier("primary"), group, sessions, "primary")
               || pickRotating(byTier("secondary"), group, sessions, "secondary")
               || pickRotating(byTier("accessory"), group, sessions, "accessory");
      if (first) result.push(buildExerciseEntry(first, style, sessions, focus));

      // Add a secondary exo for main muscle groups
      if (mainGroups.includes(group)) {
        // Try to pick something different from "first"
        const candidates = [
          ...byTier("secondary").filter(e => e.id !== first?.id),
          ...byTier("accessory").filter(e => e.id !== first?.id),
        ];
        if (candidates.length > 0) {
          const second = pickRotating(candidates, group, sessions, "secondary");
          if (second) result.push(buildExerciseEntry(second, style, sessions, focus));
        }
      }
    } else {
      // hyper: mix of secondary + accessory, or 2 accessories if no secondary
      const byTier = (t) => pool.filter(e => e.tier === t);
      const secondary = pickRotating(byTier("secondary"), group, sessions, "secondary");
      const accessory = pickRotating(byTier("accessory"), group, sessions, "accessory");

      if (secondary) result.push(buildExerciseEntry(secondary, style, sessions, focus));
      if (accessory && accessory.id !== secondary?.id) {
        result.push(buildExerciseEntry(accessory, style, sessions, focus));
      }
      // Fallback if neither (small groups like calves with only 2 total exos)
      if (!secondary && !accessory) {
        const primary = pickRotating(byTier("primary"), group, sessions, "primary");
        if (primary) result.push(buildExerciseEntry(primary, style, sessions, focus));
      }
    }
  }

  // Cap at reasonable number based on focus scope
  const maxExos = focus === "full" ? 8 : (focus === "lower" || focus === "legs") ? 7 : 8;
  const capped = result.slice(0, maxExos);

  // Core finisher: 1 core exercise at the end of every session (rotated).
  // Style-aware: heavy sessions get a stability/primary core, hyper get an isolation.
  const corePool = EXERCISES.filter(e => e.group === "Core");
  const coreTier = style === "heavy" ? "primary" : "secondary";
  const coreEx = pickRotating(
    corePool.filter(e => e.tier === coreTier),
    "Core",
    sessions,
    coreTier
  ) || corePool[0];
  if (coreEx) {
    capped.push(buildExerciseEntry(coreEx, "hyper", sessions, focus));
  }

  return capped;
}

/**
 * Rotate through available exercises in a pool, avoiding the most recent choice.
 */
function pickRotating(pool, group, sessions, tier) {
  if (pool.length === 0) return null;
  if (pool.length === 1) return pool[0];
  // Find last exercise used for this group+tier
  const recentSessions = sessions.filter(s => s.completed).slice(-5);
  const recentIds = new Set();
  for (const s of recentSessions) {
    for (const ex of (s.exercises || [])) {
      const def = EXERCISES.find(e => e.id === ex.id);
      if (def && def.group === group && def.tier === tier) {
        recentIds.add(ex.id);
      }
    }
  }
  const unused = pool.filter(e => !recentIds.has(e.id));
  if (unused.length > 0) return unused[0];
  return pool[0];
}

function buildExerciseEntry(exerciseDef, style, sessions, focus) {
  // Find last time this exercise was done
  const lastLog = findLastExerciseLog(sessions, exerciseDef.id);

  // Prescribe sets/reps based on style + tier
  let sets, repsTarget, restSeconds, rpeTarget, repUnit;

  // Core exercises: plank-style in seconds, others in reps
  if (exerciseDef.group === "Core") {
    const timedIsos = ["plank", "side_plank", "dead_bug", "bird_dog", "pallof"];
    if (timedIsos.includes(exerciseDef.id)) {
      sets = 3;
      repsTarget = exerciseDef.id === "plank" ? "30-60" : "20-40";
      restSeconds = 45;
      rpeTarget = 8;
      repUnit = "sec";
    } else {
      sets = 3;
      repsTarget = "10-15";
      restSeconds = 60;
      rpeTarget = 8;
      repUnit = "reps";
    }
  } else if (style === "heavy") {
    if (exerciseDef.tier === "primary") {
      sets = 4; repsTarget = "5-6"; restSeconds = 180; rpeTarget = 8.5;
    } else {
      sets = 4; repsTarget = "6-8"; restSeconds = 150; rpeTarget = 8;
    }
    repUnit = "reps";
  } else {
    if (exerciseDef.tier === "secondary") {
      sets = 3; repsTarget = "8-12"; restSeconds = 90; rpeTarget = 8;
    } else {
      sets = 3; repsTarget = focus === "lower" || focus === "legs" ? "10-15" : "10-12"; restSeconds = 60; rpeTarget = 7.5;
    }
    repUnit = "reps";
  }

  // Progressive overload decision
  const progression = computeProgression(lastLog, repsTarget, sets);

  return {
    id: exerciseDef.id,
    name: exerciseDef.name,
    group: exerciseDef.group,
    role: exerciseDef.role,
    tier: exerciseDef.tier,
    sets,
    repsTarget,
    repUnit,
    restSeconds,
    rpeTarget,
    suggestedWeight: progression.suggestedWeight,
    progressionNote: progression.note,
    lastSession: lastLog ? {
      weight: lastLog.weight,
      reps: lastLog.reps,
      rpe: lastLog.rpe,
    } : null,
    notes: "",
  };
}

function findLastExerciseLog(sessions, exerciseId) {
  const completed = sessions.filter(s => s.completed).sort((a,b) => new Date(b.date) - new Date(a.date));
  for (const s of completed) {
    const ex = (s.loggedExercises || []).find(e => e.id === exerciseId);
    if (ex) return ex;
  }
  return null;
}

/**
 * Progressive overload logic (mixed):
 * 1) If last 2-3 sessions had RPE <= 8 AND all reps hit target upper bound => +weight
 * 2) If reps are in range but not at top => same weight, +1 rep target
 * 3) If RPE > 8.5 or reps below target => hold
 * 4) After long absence (>3 days) => hold, focus reps
 */
function computeProgression(lastLog, repsTarget, sets) {
  if (!lastLog) {
    return { suggestedWeight: null, note: "Première fois — choisis charge technique" };
  }
  const [low, high] = repsTarget.split("-").map(Number);
  const reps = lastLog.reps || [];
  const allHitHigh = reps.length > 0 && reps.every(r => r >= high);
  const avgRpe = lastLog.rpe || 7;

  const weightIncrement = lastLog.weight >= 60 ? 2.5 : 1.25;

  if (allHitHigh && avgRpe <= 8) {
    return {
      suggestedWeight: lastLog.weight + weightIncrement,
      note: `+${weightIncrement}kg (top du range atteint, RPE OK)`,
    };
  }
  if (avgRpe > 8.5) {
    return {
      suggestedWeight: lastLog.weight,
      note: "Hold charge (RPE élevé dernière séance)",
    };
  }
  return {
    suggestedWeight: lastLog.weight,
    note: "Hold charge, vise +1 rep cette séance",
  };
}

// ============ ALGO: DELOAD DETECTION ======================================
/**
 * Detect if a deload is needed. Adaptive: fire if 3 consecutive weeks
 * of high volume without a reduced-volume week.
 */
function shouldProposeDeload(sessions, settings) {
  if (!settings.adaptiveDeload) return false;
  const byWeek = groupSessionsByWeek(sessions);
  const weeks = Object.values(byWeek).slice(-4);
  if (weeks.length < 3) return false;
  const avgVolume = weeks.slice(0, -1).reduce((sum, w) => sum + weekVolume(w), 0) / Math.max(1, weeks.length - 1);
  const highVolumeWeeks = weeks.slice(-3).filter(w => weekVolume(w) >= avgVolume * 0.9);
  return highVolumeWeeks.length >= 3;
}

function weekVolume(weekSessions) {
  return weekSessions.reduce((sum, s) => {
    const exs = s.loggedExercises || [];
    return sum + exs.reduce((a, e) => a + (e.reps || []).reduce((x, r) => x + r, 0) * (e.weight || 0), 0);
  }, 0);
}

function groupSessionsByWeek(sessions) {
  const map = {};
  for (const s of sessions) {
    if (!s.completed) continue;
    const d = new Date(s.date);
    const year = d.getFullYear();
    const week = getWeekNumber(d);
    const key = `${year}-W${week}`;
    (map[key] = map[key] || []).push(s);
  }
  return map;
}

function getWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

// ============ ALGO: RECOVERY CHECK ========================================
/**
 * Days since last session; if > 3, trigger recovery prompt.
 */
function daysSinceLastSession(sessions) {
  const completed = sessions.filter(s => s.completed);
  if (completed.length === 0) return Infinity;
  const last = completed.reduce((acc, s) => {
    const t = new Date(s.date).getTime();
    return t > acc ? t : acc;
  }, 0);
  return (Date.now() - last) / (24 * 60 * 60 * 1000);
}

function applyRecoveryAdjustment(exercises, recoveryStatus) {
  // good: no change | medium: -20% volume | poor: -30% volume
  if (recoveryStatus === "good") return exercises;
  const volMultiplier = recoveryStatus === "medium" ? 0.8 : 0.7;
  return exercises.map(ex => ({
    ...ex,
    sets: Math.max(2, Math.round(ex.sets * volMultiplier)),
    recoveryAdjusted: true,
  }));
}

function applyDeloadAdjustment(exercises) {
  return exercises.map(ex => ({
    ...ex,
    sets: Math.max(2, Math.round(ex.sets * 0.6)),
    deloadAdjusted: true,
    suggestedWeight: ex.suggestedWeight ? Math.round(ex.suggestedWeight * 0.8 / 2.5) * 2.5 : null,
  }));
}

// ============ SESSION BUILDER (MAIN ENTRY) ================================
/**
 * Build the next recommended session based on all history.
 */
function buildNextSession(sessions, settings, overrides = {}) {
  const split = overrides.split || pickSplit(sessions, settings.weeklyTarget, settings);
  if (split === SPLITS.MAINTENANCE) {
    return {
      type: "maintenance",
      name: "Maintenance / Light",
      split,
      muscleGroups: [],
      exercises: [],
      note: "Fréquence <2/sem — reprends doucement. Pas de séance imposée.",
    };
  }

  const picked = pickNextSessionType(sessions, split);
  if (!picked) {
    return {
      type: "rest",
      name: "Repos",
      split,
      muscleGroups: [],
      exercises: [],
      note: "Tous les groupes sont en récupération (<48h). Repos recommandé.",
    };
  }

  let exercises = buildExercises(picked.focus, picked.style, sessions);

  const recovery = overrides.recovery || "good";
  if (daysSinceLastSession(sessions) > 3 && recovery !== "good") {
    exercises = applyRecoveryAdjustment(exercises, recovery);
  }

  if (overrides.deload || shouldProposeDeload(sessions, settings) && overrides.acceptDeload) {
    exercises = applyDeloadAdjustment(exercises);
  }

  const muscleGroups = [...new Set(exercises.map(e => e.group))];
  const plannedVolume = exercises.reduce((sum, e) => sum + e.sets, 0);

  return {
    id: `${new Date().toISOString().slice(0,10)}_${picked.key}`,
    date: new Date().toISOString(),
    type: picked.name,
    sessionKey: picked.key,
    split,
    focus: picked.focus,
    style: picked.style,
    muscleGroups,
    plannedVolume,
    exercises,
    completed: false,
    restOK: picked.restOK,
    note: picked.restOK ? null : "⚠ Certains groupes <48h de récup, propose reste ou alternative",
  };
}

// ============ STORAGE LAYER ===============================================
/**
 * Dual-storage: Firestore as source of truth, localStorage mirror.
 * Falls back to localStorage-only if Firebase unavailable.
 */
class Store {
  constructor() {
    this.uid = null;
    this.fs = null;
    this.ready = false;
    this.firebaseReady = false;
    this._readyWaiters = [];
  }

  async init() {
    // Always load localStorage first (instant)
    this._localCache = this._readLocal();

    if (!FIREBASE_ENABLED) {
      this.ready = true;
      this._firebaseOn = false;
      return;
    }

    try {
      await this._waitForFirebase();
      const app = window.firebase.initializeApp(FIREBASE_CONFIG);
      const auth = window.firebase.getAuth(app);
      this.fs = window.firebase.getFirestore(app);

      await new Promise((res, rej) => {
        window.firebase.onAuthStateChanged(auth, (user) => {
          if (user) { this.uid = user.uid; res(); }
        });
        window.firebase.signInAnonymously(auth).catch(rej);
      });

      this._firebaseOn = true;
      this.ready = true;
    } catch (e) {
      console.warn("Firebase init failed, using localStorage only:", e);
      this._firebaseOn = false;
      this.ready = true;
    }
  }

  _waitForFirebase() {
    return new Promise(res => {
      if (window.firebase) return res();
      window.addEventListener('firebase-ready', () => res(), { once: true });
      setTimeout(res, 2000); // safety fallback — don't block UI
    });
  }

  _readLocal() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : { sessions: [], settings: null, currentSession: null };
    } catch {
      return { sessions: [], settings: null, currentSession: null };
    }
  }

  _writeLocal(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) { console.warn(e); }
  }

  async loadAll() {
    const local = this._readLocal();
    if (!this._firebaseOn) return local;
    try {
      const userDoc = window.firebase.doc(this.fs, `users/${this.uid}`);
      const snap = await window.firebase.getDoc(userDoc);
      const settings = snap.exists() ? snap.data().settings : null;

      const sessionsCol = window.firebase.collection(this.fs, `users/${this.uid}/sessions`);
      const q = window.firebase.query(sessionsCol, window.firebase.orderBy("date", "desc"), window.firebase.limit(500));
      const sessSnap = await window.firebase.getDocs(q);
      const sessions = [];
      sessSnap.forEach(d => sessions.push({ ...d.data(), _docId: d.id }));

      const currentDoc = window.firebase.doc(this.fs, `users/${this.uid}/state/current`);
      const curSnap = await window.firebase.getDoc(currentDoc);
      const currentSession = curSnap.exists() ? curSnap.data() : null;

      const merged = { sessions, settings: settings || local.settings, currentSession };
      this._writeLocal(merged);
      return merged;
    } catch (e) {
      console.warn("Firestore load failed, using local:", e);
      return local;
    }
  }

  async saveSettings(settings) {
    const local = this._readLocal();
    local.settings = settings;
    this._writeLocal(local);
    if (!this._firebaseOn) return;
    try {
      const userDoc = window.firebase.doc(this.fs, `users/${this.uid}`);
      await window.firebase.setDoc(userDoc, { settings }, { merge: true });
    } catch (e) { console.warn(e); }
  }

  async saveSession(session) {
    const local = this._readLocal();
    const existingIdx = local.sessions.findIndex(s => s.id === session.id);
    if (existingIdx >= 0) local.sessions[existingIdx] = session;
    else local.sessions.unshift(session);
    this._writeLocal(local);
    if (!this._firebaseOn) return;
    try {
      const sessionsCol = window.firebase.collection(this.fs, `users/${this.uid}/sessions`);
      const docRef = window.firebase.doc(sessionsCol, session.id);
      await window.firebase.setDoc(docRef, session);
    } catch (e) { console.warn(e); }
  }

  async deleteSession(sessionId) {
    const local = this._readLocal();
    local.sessions = local.sessions.filter(s => s.id !== sessionId);
    this._writeLocal(local);
    if (!this._firebaseOn) return;
    try {
      const docRef = window.firebase.doc(this.fs, `users/${this.uid}/sessions/${sessionId}`);
      await window.firebase.deleteDoc(docRef);
    } catch (e) { console.warn(e); }
  }

  async saveCurrentSession(session) {
    const local = this._readLocal();
    local.currentSession = session;
    this._writeLocal(local);
    if (!this._firebaseOn) return;
    try {
      const docRef = window.firebase.doc(this.fs, `users/${this.uid}/state/current`);
      await window.firebase.setDoc(docRef, session || {});
    } catch (e) { console.warn(e); }
  }

  async clearCurrentSession() {
    const local = this._readLocal();
    local.currentSession = null;
    this._writeLocal(local);
    if (!this._firebaseOn) return;
    try {
      const docRef = window.firebase.doc(this.fs, `users/${this.uid}/state/current`);
      await window.firebase.deleteDoc(docRef);
    } catch (e) { console.warn(e); }
  }

  isFirebase() { return this._firebaseOn; }
  getUid() { return this.uid; }
}

const store = new Store();

// ============ CONTEXT =====================================================
const AppContext = createContext(null);

function AppProvider({ children }) {
  const [bootState, setBootState] = useState("loading"); // loading | needsOnboarding | ready
  const [sessions, setSessions] = useState([]);
  const [settings, setSettings] = useState(null);
  const [currentSession, setCurrentSession] = useState(null);
  const [tab, setTab] = useState("today");

  useEffect(() => {
    (async () => {
      await store.init();
      const data = await store.loadAll();
      setSessions(data.sessions || []);
      setCurrentSession(data.currentSession || null);
      if (!data.settings) {
        setBootState("needsOnboarding");
      } else {
        setSettings(data.settings);
        setBootState("ready");
      }
    })();
  }, []);

  const completeOnboarding = useCallback(async (newSettings) => {
    await store.saveSettings(newSettings);
    setSettings(newSettings);
    setBootState("ready");
  }, []);

  const updateSettings = useCallback(async (patch) => {
    const next = { ...settings, ...patch };
    setSettings(next);
    await store.saveSettings(next);
  }, [settings]);

  const startSession = useCallback(async (session) => {
    setCurrentSession(session);
    await store.saveCurrentSession(session);
    setTab("active");
  }, []);

  const updateCurrentSession = useCallback(async (updater) => {
    const next = typeof updater === "function" ? updater(currentSession) : updater;
    setCurrentSession(next);
    await store.saveCurrentSession(next);
  }, [currentSession]);

  const finishSession = useCallback(async (finalSession) => {
    const completed = { ...finalSession, completed: true, completedAt: new Date().toISOString() };
    await store.saveSession(completed);
    await store.clearCurrentSession();
    setSessions(prev => {
      const idx = prev.findIndex(s => s.id === completed.id);
      if (idx >= 0) {
        const copy = [...prev];
        copy[idx] = completed;
        return copy;
      }
      return [completed, ...prev];
    });
    setCurrentSession(null);
    setTab("today");
  }, []);

  const discardCurrentSession = useCallback(async () => {
    await store.clearCurrentSession();
    setCurrentSession(null);
    setTab("today");
  }, []);

  const deleteSession = useCallback(async (id) => {
    await store.deleteSession(id);
    setSessions(prev => prev.filter(s => s.id !== id));
  }, []);

  const value = useMemo(() => ({
    bootState, sessions, settings, currentSession, tab, setTab,
    completeOnboarding, updateSettings,
    startSession, updateCurrentSession, finishSession, discardCurrentSession,
    deleteSession,
    isFirebase: store.isFirebase(),
  }), [bootState, sessions, settings, currentSession, tab,
      completeOnboarding, updateSettings, startSession, updateCurrentSession,
      finishSession, discardCurrentSession, deleteSession]);

  return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
}

// ============ TODAY (HOME) ================================================
function TodayScreen() {
  const { sessions, settings, currentSession, startSession, setTab, discardCurrentSession } = useApp();
  const [recovery, setRecovery] = useState(null);
  const [needsRecoveryPrompt, setNeedsRecoveryPrompt] = useState(false);
  const [useDeload, setUseDeload] = useState(false);
  const [deloadAvailable, setDeloadAvailable] = useState(false);
  const [forcedSplit, setForcedSplit] = useState(null);       // override the auto-picked split
  const [forcedSessionKey, setForcedSessionKey] = useState(null); // override the auto-picked session
  const [regenNonce, setRegenNonce] = useState(0);             // bump to force re-compute
  const [showAbandonModal, setShowAbandonModal] = useState(false);

  useEffect(() => {
    const days = daysSinceLastSession(sessions);
    if (days > 3 && days < 999) setNeedsRecoveryPrompt(true);
    else setRecovery("good");

    setDeloadAvailable(shouldProposeDeload(sessions, settings));
  }, [sessions, settings]);

  const proposedSession = useMemo(() => {
    if (!recovery && needsRecoveryPrompt) return null;
    const base = buildNextSession(sessions, settings, {
      recovery: recovery || "good",
      deload: useDeload,
      acceptDeload: useDeload,
      split: forcedSplit,
    });

    // If user manually picked a specific session type, rebuild with that
    if (forcedSessionKey && SESSION_TYPES[forcedSessionKey]) {
      const t = SESSION_TYPES[forcedSessionKey];
      let exs = buildExercises(t.focus, t.style, sessions);
      if (daysSinceLastSession(sessions) > 3 && recovery !== "good" && recovery) {
        exs = applyRecoveryAdjustment(exs, recovery);
      }
      if (useDeload) exs = applyDeloadAdjustment(exs);
      const muscleGroups = [...new Set(exs.map(e => e.group))];
      return {
        ...base,
        id: `${new Date().toISOString().slice(0,10)}_${forcedSessionKey}_${regenNonce}`,
        type: t.name,
        sessionKey: forcedSessionKey,
        split: t.split,
        focus: t.focus,
        style: t.style,
        muscleGroups,
        plannedVolume: exs.reduce((s, e) => s + e.sets, 0),
        exercises: exs,
        note: null,
        restOK: true,
      };
    }
    return base;
  }, [sessions, settings, recovery, needsRecoveryPrompt, useDeload, forcedSplit, forcedSessionKey, regenNonce]);

  // Reset helper: wipe all session-related local state
  const resetProposal = () => {
    setRecovery(null);
    setNeedsRecoveryPrompt(false);
    setUseDeload(false);
    setForcedSplit(null);
    setForcedSessionKey(null);
    setRegenNonce(n => n + 1);
    // Re-run the recovery check
    const days = daysSinceLastSession(sessions);
    if (days > 3 && days < 999) setNeedsRecoveryPrompt(true);
    else setRecovery("good");
  };

  if (currentSession) {
    return (
      <div className="p-4 max-w-screen-md mx-auto">
        <div className="card p-5 anim-fade-up border-[var(--accent)]">
          <div className="font-mono text-[10px] text-[var(--accent)] tracking-widest">SESSION ACTIVE</div>
          <div className="font-display text-2xl mt-2">{currentSession.type}</div>
          <div className="font-mono text-xs text-[var(--ink-dim)] mt-1">
            En cours — {currentSession.exercises?.filter(e => e.logged).length || 0}/{currentSession.exercises?.length || 0} exos loggés
          </div>
          <button onClick={() => setTab("active")} className="btn btn-primary w-full mt-4">
            → REPRENDRE LA SÉANCE
          </button>
          <button
            onClick={() => setShowAbandonModal(true)}
            className="btn btn-ghost w-full mt-2 text-[10px] btn-danger"
          >
            ✕ ABANDONNER LA SÉANCE
          </button>
        </div>
        {showAbandonModal && (
          <ConfirmModal
            title="Abandonner la séance ?"
            body="Rien ne sera enregistré dans l'historique. Tu pourras générer une nouvelle séance ou en choisir une autre manuellement."
            confirmLabel="ABANDONNER"
            onConfirm={async () => {
              setShowAbandonModal(false);
              await discardCurrentSession();
            }}
            onCancel={() => setShowAbandonModal(false)}
          />
        )}
      </div>
    );
  }

  if (needsRecoveryPrompt && !recovery) {
    return (
      <div className="p-4 max-w-screen-md mx-auto">
        <div className="card p-6 anim-fade-up">
          <div className="font-mono text-[10px] text-[var(--warn)] tracking-widest">PAUSE DÉTECTÉE</div>
          <div className="font-display text-2xl mt-2 leading-tight">
            {Math.round(daysSinceLastSession(sessions))} jours depuis la dernière séance.
          </div>
          <div className="text-sm text-[var(--ink-dim)] mt-2">Comment va la récup ?</div>

          <div className="mt-5 space-y-2">
            {[
              { key: "good",   label: "Impeccable",  sub: "Aucune réduction de volume", color: "var(--accent)" },
              { key: "medium", label: "Bof",         sub: "Volume -20%, accessoires allégés", color: "var(--warn)" },
              { key: "poor",   label: "Pas ouf",     sub: "Volume -30%, focus technique",     color: "var(--danger)" },
            ].map(o => (
              <button
                key={o.key}
                onClick={() => { setRecovery(o.key); setNeedsRecoveryPrompt(false); }}
                className="w-full p-4 card text-left hover:border-[var(--ink-dim)] transition-colors"
              >
                <div className="flex items-center justify-between">
                  <div>
                    <div className="font-display text-lg">{o.label}</div>
                    <div className="font-mono text-[11px] text-[var(--ink-dim)] mt-0.5">{o.sub}</div>
                  </div>
                  <div className="w-2 h-8" style={{ background: o.color }}></div>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if (!proposedSession) return null;

  if (proposedSession.type === "maintenance" || proposedSession.type === "rest") {
    return (
      <div className="p-4 max-w-screen-md mx-auto">
        <div className="card p-6 anim-fade-up">
          <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest">STATUS</div>
          <div className="font-display text-3xl mt-2 leading-tight">{proposedSession.name}</div>
          <div className="text-sm text-[var(--ink-dim)] mt-3">{proposedSession.note}</div>
        </div>
      </div>
    );
  }

  const freq = computeFrequency(sessions, 14);
  const lastSession = sessions.filter(s => s.completed)[0];
  const hoursSinceLast = lastSession ? ((Date.now() - new Date(lastSession.date).getTime()) / (60*60*1000)) : null;

  return (
    <div className="p-4 max-w-screen-md mx-auto pb-safe">
      {/* Top metadata strip */}
      <div className="flex items-center justify-between mb-4 font-mono text-[10px] text-[var(--ink-dim)] tracking-widest">
        <div>PROTOCOL / {proposedSession.split.toUpperCase()}</div>
        <div>{new Date().toLocaleDateString('fr-FR', { weekday: 'short', day: '2-digit', month: 'short' }).toUpperCase()}</div>
      </div>

      {/* Main session card */}
      <div className="card-accent relative anim-fade-up">
        {/* Decorative stripes */}
        <div className="absolute top-0 right-0 w-16 h-1.5 bg-[var(--accent)]"></div>
        <div className="absolute top-0 right-16 w-8 h-1.5 stripes"></div>

        <div className="p-5">
          <div className="flex items-start justify-between">
            <div>
              <div className="font-mono text-[10px] text-[var(--accent)] tracking-widest">SESSION #{sessions.filter(s => s.completed).length + 1}</div>
              <h2 className="font-display text-4xl mt-1 leading-none">{proposedSession.type}</h2>
            </div>
            <div className="text-right">
              <div className="font-display text-3xl">{proposedSession.exercises.length}</div>
              <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest">EXOS</div>
            </div>
          </div>

          {/* Meta grid */}
          <div className="mt-5 grid grid-cols-3 gap-3">
            <MetaBlock label="VOLUME" value={proposedSession.plannedVolume} unit="SETS" />
            <MetaBlock label="STYLE" value={proposedSession.style === "heavy" ? "LOURD" : "HYPER"} />
            <MetaBlock label="DURÉE~" value={estimateDuration(proposedSession)} unit="MIN" />
          </div>

          <div className="mt-5 pt-4 border-t border-[var(--line)]">
            <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-2">GROUPES CIBLÉS</div>
            <div className="flex flex-wrap gap-2">
              {proposedSession.muscleGroups.map(g => (
                <span key={g} className="font-mono text-[11px] px-2 py-1 bg-[var(--bg-3)] border border-[var(--line-bright)]">
                  {g.toUpperCase()}
                </span>
              ))}
            </div>
          </div>

          <div className="mt-4 font-mono text-[11px] text-[var(--ink-dim)]">
            {lastSession ? `→ Dernier entraînement : il y a ${Math.round(hoursSinceLast)}h (${lastSession.type})` : "→ Première séance"}
          </div>
        </div>
      </div>

      {/* Deload banner */}
      {deloadAvailable && !useDeload && (
        <div className="mt-3 card p-3 border-[var(--warn)]">
          <div className="flex items-start justify-between gap-3">
            <div>
              <div className="font-mono text-[10px] text-[var(--warn)] tracking-widest">DELOAD RECOMMANDÉE</div>
              <div className="text-xs text-[var(--ink-dim)] mt-1">3 semaines consécutives à volume élevé. Propose un deload (-40% volume) ?</div>
            </div>
            <button onClick={() => setUseDeload(true)} className="btn btn-ghost text-[10px]">ACCEPT</button>
          </div>
        </div>
      )}

      {/* Exercise preview */}
      <div className="mt-5">
        <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-3">SEQUENCE / {proposedSession.exercises.length} EXOS</div>
        <div className="space-y-2">
          {proposedSession.exercises.map((ex, i) => (
            <ExercisePreviewCard key={ex.id + i} ex={ex} idx={i} />
          ))}
        </div>
      </div>

      <button
        onClick={() => startSession(proposedSession)}
        className="btn btn-primary w-full mt-6 text-base py-4"
      >
        → DÉMARRER LA SÉANCE
      </button>

      {/* Swap / override panel */}
      <SwapPanel
        currentSplit={proposedSession.split}
        currentKey={proposedSession.sessionKey}
        onForceSplit={(s) => { setForcedSplit(s); setForcedSessionKey(null); setRegenNonce(n => n+1); }}
        onForceSession={(k) => { setForcedSessionKey(k); setRegenNonce(n => n+1); }}
        onReset={resetProposal}
      />
    </div>
  );
}

function SwapPanel({ currentSplit, currentKey, onForceSplit, onForceSession, onReset }) {
  const [open, setOpen] = useState(false);

  // Sessions available in the current split (or all if maintenance)
  const availableSessions = Object.entries(SESSION_TYPES)
    .filter(([k, v]) => v.split === currentSplit && k !== currentKey);

  return (
    <div className="mt-3">
      <button
        onClick={() => setOpen(!open)}
        className="btn btn-ghost w-full text-[11px]"
      >
        {open ? "▲ FERMER" : "▼ CHANGER / RÉGÉNÉRER"}
      </button>

      {open && (
        <div className="card p-4 mt-2 anim-fade-up">
          {/* Manual session swap */}
          {availableSessions.length > 0 && (
            <>
              <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-2">
                AUTRE SÉANCE / {currentSplit.toUpperCase()}
              </div>
              <div className="grid grid-cols-2 gap-2 mb-4">
                {availableSessions.map(([k, v]) => (
                  <button
                    key={k}
                    onClick={() => { onForceSession(k); setOpen(false); }}
                    className="p-3 card text-left hover:border-[var(--ink-dim)]"
                  >
                    <div className="font-display text-sm">{v.name}</div>
                    <div className="font-mono text-[9px] text-[var(--ink-dim)] mt-0.5 tracking-widest">
                      {v.style.toUpperCase()}
                    </div>
                  </button>
                ))}
              </div>
            </>
          )}

          {/* Force different split */}
          <div className="font-mono text-[10px] text-[var(--ink-dim)] tracking-widest mb-2">
            FORCER UN AUTRE SPLIT
          </div>
          <div className="grid grid-cols-3 gap-2 mb-4">
            {[SPLITS.UPPER_LOWER, SPLITS.PPL, SPLITS.FULL_BODY]
              .filter(s => s !== currentSplit)
              .map(s => (
                <button
                  key={s}
                  onClick={() => { onForceSplit(s); setOpen(false); }}
                  className="p-2 card text-center hover:border-[var(--ink-dim)]"
                >
                  <div className="font-mono text-[10px]">{s.toUpperCase()}</div>
                </button>
              ))}
          </div>

          {/* Full reset */}
          <button
            onClick={() => { onReset(); setOpen(false); }}
            className="btn btn-ghost w-full text-[10px] btn-danger"
          >
            ↻ RESET COMPLET
          </button>
          <div className="font-mono text-[9px] text-[var(--ink-dim)] mt-2 text-center">
            Reset = efface tous les overrides locaux et re-propose depuis l'algo
          </div>
        </div>
      )}
    </div>
  );
}

function MetaBlock({ label, value, unit }) {
  return (
    <div className="border-l-2 border-[var(--accent)] pl-3">
      <div className="font-mono text-[9px] text-[var(--ink-dim)] tracking-widest">{label}</div>
      <div className="font-display text-xl mt-0.5">

}
